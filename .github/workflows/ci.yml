name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      # Playwright e2e runs on PRs only (slower, needs browser install).
      - if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium
      - if: github.event_name == 'pull_request'
        run: npm run e2e
